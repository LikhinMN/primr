name: Release Primr

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build addon zip
        run: zip -r primr.zip primr/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: primr.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}